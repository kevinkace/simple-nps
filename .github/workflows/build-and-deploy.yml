name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build script package
      run: npm run build:script

    - name: Build website for custom domain
      run: npm run build:website

    - name: Copy script to website build
      run: |
        mkdir -p ./apps/website/build/script
        cp ./packages/script/dist/simple-nps.iife.js ./apps/website/build/script/

    - name: Upload Pages artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./apps/website/build

  publish-npm:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.14.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build script package
      run: npm run build:script

    - name: Check if version changed
      id: check-version
      run: |
        PACKAGE_VERSION=$(node -p "require('./packages/script/package.json').version")
        PUBLISHED_VERSION=$(npm view simple-nps version 2>/dev/null || echo "0.0.0")
        echo "current-version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
        echo "published-version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
        if [ "$PACKAGE_VERSION" != "$PUBLISHED_VERSION" ]; then
          echo "should-publish=true" >> $GITHUB_OUTPUT
          echo "Version changed from $PUBLISHED_VERSION to $PACKAGE_VERSION"
        else
          echo "should-publish=false" >> $GITHUB_OUTPUT
          echo "Version unchanged: $PACKAGE_VERSION"
        fi

    - name: Publish to npm
      if: steps.check-version.outputs.should-publish == 'true'
      working-directory: ./packages/script
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npm publish

    - name: Create GitHub Release
      if: steps.check-version.outputs.should-publish == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.check-version.outputs.current-version }}
        name: Release v${{ steps.check-version.outputs.current-version }}
        body: |
          ## Changes
          - Published simple-nps v${{ steps.check-version.outputs.current-version }} to npm

          ## Installation
          ```bash
          npm install simple-nps
          ```

          ## CDN Usage
          ```html
          <script src="https://unpkg.com/simple-nps@${{ steps.check-version.outputs.current-version }}/dist/simple-nps.iife.js"></script>
          ```
        draft: false
        prerelease: false

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4