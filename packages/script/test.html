<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple NPS Test</title>
</head>
<body>
    <h1>Simple NPS Test Page</h1>
    <p>The NPS widget should appear automatically when the script loads.</p>
    <p>You can also manually reinitialize it by clicking the button below:</p>
    <button onclick="showNPS()">Reinitialize NPS</button>

    <!-- Configure the NPS -->
    <script>
    window.simpleNpsConfig = {
        gaId: "G-XXXXXXXXXX", // Optional
        i18n: {
            en: {
                intro: "How likely are you to recommend our service?",
                notLikely: "Not at all likely",
                extremelyLikely: "Extremely likely",
                submitBtn: "Submit",
                thankYou: "Thank you for your feedback!",
                followUp: "What could we improve?"
            }
        },
        language: 'en'
    };
    </script>

    <!-- Include the NPS script -->
    <script src="./dist/simple-nps.iife.js"></script>

    <!-- Test script functionality -->
    <script>
    console.log('Script loaded. NPS should auto-initialize...');
    console.log('window.initSimpleNps:', typeof window.initSimpleNps);

    function showNPS() {
        console.log('Manually reinitializing NPS...');
        if (typeof window.initSimpleNps === 'function') {
            try {
                const result = window.initSimpleNps();
                console.log('NPS reinitialized successfully:', result);
            } catch (error) {
                console.error('Error reinitializing NPS:', error);
        showNPS();
    }, 2000);
    </script>
</body>
</html>
